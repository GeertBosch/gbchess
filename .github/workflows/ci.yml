name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - cc: gcc
            cxx: g++
            name: GCC
          - cc: clang
            cxx: clang++
            name: Clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang wget zstd

      - name: Run CI checks (${{ matrix.compiler.name }})
        env:
          CC: ${{ matrix.compiler.cc }}
          CXX: ${{ matrix.compiler.cxx }}
        run: make -j"$(nproc)" ci

      - name: Verify architecture docs are up to date
        run: |
          ./check-arch.sh
          if ! git diff --quiet -- src/README.md; then
            echo "src/README.md is out of date after check-arch.sh"
            echo "Run ./check-arch.sh and commit the updated file"
            git --no-pager diff -- src/README.md
            exit 1
          fi
